<!DOCTYPE html>
<html>
<head>
<title>ASCEND ORDER</title>
<style>
body{
 background:#0f172a;
 font-family:Arial;
 color:#fff;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}
form{
 background:#111827;
 padding:25px;
 border-radius:10px;
 width:350px;
 box-shadow:0 0 20px black;
}
input,button{
 width:100%;
 margin:8px 0;
 padding:10px;
 border:none;
 border-radius:6px;
}
button{
 background:gold;
 font-weight:bold;
 cursor:pointer;
}
#msg{text-align:center;margin-top:10px;}
</style>
</head>
<body>

<form id="orderForm">
<h2>ASCEND ORDER</h2>

<input type="text" name="ic" placeholder="IC NAME" required>
<input type="text" name="dc" placeholder="DC NAME" required>
<input type="text" name="gpay" placeholder="GPAY NAME" required>
<input type="text" name="pack" placeholder="PACK NAME" required>
<input type="number" step="0.01" name="amount" placeholder="AMOUNT" required>
<input type="date" name="date" required>

<button type="submit">SUBMIT</button>
<p id="msg"></p>
</form>

<script>
let lastSubmit=0;

document.getElementById("orderForm").addEventListener("submit",async e=>{
e.preventDefault();

const now=Date.now();
if(now-lastSubmit<10000){
 document.getElementById("msg").innerText="❌ Wait 10 sec (Anti spam)";
 return;
}
lastSubmit=now;

let formData=new FormData(e.target);

let res=await fetch("save.php",{
 method:"POST",
 body:formData
});

let text=await res.text();

if(text==="success"){
 document.getElementById("msg").innerText="✅ Saved & Sent to Discord";
 e.target.reset();
}else{
 document.getElementById("msg").innerText="❌ Error saving";
}
});
</script>

</body>
</html>
